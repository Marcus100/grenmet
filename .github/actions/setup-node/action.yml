name: Setup Node.js with pnpm
description: Install pnpm, set up Node.js with cache, and install dependencies

inputs:
  node-version:
    description: Node.js version to use
    default: "22"
  strict-peer-dependencies:
    description: Fail if peer dependency conflicts are detected
    default: "false"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - run: pnpm install --frozen-lockfile ${{ inputs.strict-peer-dependencies == 'true' && '--strict-peer-dependencies' || '' }}
      shell: bash
