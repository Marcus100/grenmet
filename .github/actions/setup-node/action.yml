name: Setup Node.js with pnpm
description: Install pnpm, set up Node.js with cache, and install dependencies

inputs:
  node-version:
    description: Node.js version to use
    default: "22"
  pnpm-version:
    description: pnpm version to use
    default: "10"
  strict-peer-dependencies:
    description: Fail if peer dependency conflicts are detected
    default: "false"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - run: pnpm install --frozen-lockfile ${{ inputs.strict-peer-dependencies == 'true' && '--strict-peer-dependencies' || '' }}
      shell: bash
