name: Deploy to Staging

# Phase 3c cutover: no workflow_run trigger anymore. Staging deploys run as a
# workflow_call child of pipeline-staging, whose `needs:` chain guarantees CI
# and builds are green for this exact SHA — the old check-builds polling gate
# (and its "no run yet = OK" race) is gone. workflow_dispatch remains as the
# manual escape hatch.
on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, staging]
    timeout-minutes: 20
    environment:
      name: staging
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: infra/docker
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1
        with:
          ref: ${{ github.ref }}
          clean: false

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          WXWATCH_DB_PASSWORD: ${{ secrets.WXWATCH_DB_PASSWORD }}
          WXPRODUCTS_DB_PASSWORD: ${{ secrets.WXPRODUCTS_DB_PASSWORD }}
          JANITORIAL_DB_PASSWORD: ${{ secrets.JANITORIAL_DB_PASSWORD }}
          TRANSPORT_DB_PASSWORD: ${{ secrets.TRANSPORT_DB_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          USERNAME: ${{ secrets.USERNAME }}
          HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STORAGE_ENDPOINT_URL: ${{ secrets.STORAGE_ENDPOINT_URL }}
          STORAGE_REGION: ${{ secrets.STORAGE_REGION }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          STORAGE_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
          STORAGE_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
          STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          cat > .env <<EOF
          ENVIRONMENT=staging
          DOMAIN=api.staging.barrels.gd
          POSTGRES_DB=app_staging
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          WXWATCH_DB_NAME=wxwatch_staging
          WXWATCH_DB_USER=wxwatch
          WXWATCH_DB_PASSWORD=${WXWATCH_DB_PASSWORD}
          WXPRODUCTS_DB_NAME=wxproducts_staging
          WXPRODUCTS_DB_USER=wxproducts
          WXPRODUCTS_DB_PASSWORD=${WXPRODUCTS_DB_PASSWORD}
          JANITORIAL_DB_NAME=janitorial_staging
          JANITORIAL_DB_USER=janitorial
          JANITORIAL_DB_PASSWORD=${JANITORIAL_DB_PASSWORD}
          TRANSPORT_DB_NAME=transport_staging
          TRANSPORT_DB_USER=transport
          TRANSPORT_DB_PASSWORD=${TRANSPORT_DB_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG=staging
          GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          WEB_TAG=staging
          SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
          RESEND_API_KEY=${RESEND_API_KEY}
          WXWATCH_DB_URL=postgresql://wxwatch:${WXWATCH_DB_PASSWORD}@db:5432/wxwatch_staging
          WXPRODUCTS_DB_URL=postgresql://wxproducts:${WXPRODUCTS_DB_PASSWORD}@db:5432/wxproducts_staging
          JANITORIAL_DB_URL=postgresql://janitorial:${JANITORIAL_DB_PASSWORD}@db:5432/janitorial_staging
          TRANSPORT_DB_URL=postgresql://transport:${TRANSPORT_DB_PASSWORD}@db:5432/transport_staging
          EMAIL=${EMAIL}
          USERNAME=${USERNAME}
          HASHED_PASSWORD=${HASHED_PASSWORD}
          SENTRY_DSN=${SENTRY_DSN:-}
          PROJECT_NAME=Grenmet API
          BACKEND_CORS_ORIGINS=https://auth.staging.barrels.gd,https://admin.staging.barrels.gd,https://hurricane.staging.barrels.gd,https://spice.staging.barrels.gd
          SESSION_COOKIE_DOMAIN=.staging.barrels.gd
          EMAILS_FROM_EMAIL=noreply@barrels.gd
          FRONTEND_HOST=https://auth.staging.barrels.gd
          REDIS_URL=redis://redis:6379/0
          STORAGE_ENDPOINT_URL=${STORAGE_ENDPOINT_URL:-}
          STORAGE_REGION=${STORAGE_REGION:-}
          STORAGE_BUCKET=${STORAGE_BUCKET:-}
          STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID:-}
          STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY:-}
          STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL:-}
          EOF

          sed -i 's/^[[:space:]]*//' .env
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|PASSWORD|HASHED_PASSWORD|RESEND_API_KEY|SENTRY_DSN)=.*/\1=****/' .env

      - name: Validate compose configuration
        run: docker compose --env-file .env -f docker-compose.staging.yml config >/dev/null

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Stop existing staging stack
        run: |
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" down --remove-orphans || true

      - name: Pull images
        run: |
          set -euo pipefail
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" pull \
            api db proxy prestart adminer || true
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" pull \
            web-auth web-admin web-migrate web-hurricaneplan web-spicewx || true

      - name: Deploy full staging stack
        run: |
          set -euo pipefail
          # --pull always: never reuse a stale cached image (e.g. web-admin); always
          # fetch the freshly-built tag so the droplet runs the latest code.
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" up -d --pull always --remove-orphans
          echo "=== Service status ===" ; docker compose -p "grenmet-staging" ps || true

      - name: Health checks
        run: |
          set -uo pipefail
          COMPOSE="docker compose --env-file .env -f docker-compose.staging.yml -p grenmet-staging"

          echo "=== API health (fatal) ==="
          PASSED=false
          for i in {1..10}; do
            if curl -f -s "https://api.staging.barrels.gd/api/v1/utils/health-check/" >/dev/null; then
              echo "API healthy"; PASSED=true; break
            fi
            echo "attempt $i/10..."; sleep 10
          done
          [ "$PASSED" = true ] || { echo "::error::API health check failed"; exit 1; }

          echo "=== Web app container health (fatal) ==="
          # Gate on each web container's own /api/health (via the compose healthcheck),
          # so a container that boots then fails to serve cannot deploy green.
          for svc in web-auth web-admin web-hurricaneplan web-spicewx; do
            cid=$($COMPOSE ps -q "$svc" 2>/dev/null || true)
            [ -n "$cid" ] || { echo "::error::$svc has no running container"; exit 1; }
            ok=false
            for i in {1..20}; do
              status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid" 2>/dev/null || echo missing)
              case "$status" in
                healthy) ok=true; break ;;
                none) echo "$svc: no healthcheck defined — skipping gate"; ok=true; break ;;
                *) echo "$svc: $status ($i/20)"; sleep 6 ;;
              esac
            done
            [ "$ok" = true ] || { echo "::error::$svc did not become healthy"; exit 1; }
          done

          echo "=== External smoke via Cloudflare (non-fatal) ==="
          for host in auth admin hurricane spice; do
            code=$(curl -4 -sS -o /dev/null -w '%{http_code}' --max-time 15 "https://$host.staging.barrels.gd/" || echo 000)
            echo "  $host.staging.barrels.gd → $code"
          done

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -p "grenmet-staging" ps || true
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" logs --no-color --tail=100 prestart || true
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" logs --no-color --tail=100 api || true

      - name: Cleanup
        if: always()
        run: |
          docker image prune -f || true
          rm -f .env
