name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build and Push Docker Images", "Build Web App Images"]
    types: [completed]
    branches: [staging]
  workflow_dispatch:

jobs:
  # Guard: both build workflows must have succeeded on the staging branch before
  # we deploy. workflow_run fires once per workflow that finishes, so without this
  # check the deploy would start as soon as the first build completes, potentially
  # pulling a stale image for the other set.
  check-builds:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check both build workflows succeeded
        id: check
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            if (context.eventName !== 'workflow_run') {
              core.setOutput('ready', 'true');
              return;
            }
            const sha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const workflows = ['Build and Push Docker Images', 'Build Web App Images'];
            for (const name of workflows) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: branch,
                per_page: 20,
              });
              const run = data.workflow_runs.find(r => r.name === name && r.head_sha === sha);
              if (run && run.conclusion !== 'success') {
                core.setOutput('ready', 'false');
                return;
              }
              // No run for this sha means no relevant files changed — existing image is valid
            }
            core.setOutput('ready', 'true');

  deploy:
    needs: check-builds
    if: needs.check-builds.outputs.ready == 'true'
    runs-on: [self-hosted, staging]
    timeout-minutes: 20
    environment:
      name: staging
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: infra/docker
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          clean: false

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          WXWATCH_DB_PASSWORD: ${{ secrets.WXWATCH_DB_PASSWORD }}
          WXPRODUCTS_DB_PASSWORD: ${{ secrets.WXPRODUCTS_DB_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          USERNAME: ${{ secrets.USERNAME }}
          HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STORAGE_ENDPOINT_URL: ${{ secrets.STORAGE_ENDPOINT_URL }}
          STORAGE_REGION: ${{ secrets.STORAGE_REGION }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          STORAGE_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
          STORAGE_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
          STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          cat > .env <<EOF
          ENVIRONMENT=staging
          DOMAIN=api.staging.barrels.gd
          POSTGRES_DB=app_staging
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          WXWATCH_DB_NAME=wxwatch_staging
          WXWATCH_DB_USER=wxwatch
          WXWATCH_DB_PASSWORD=${WXWATCH_DB_PASSWORD}
          WXPRODUCTS_DB_NAME=wxproducts_staging
          WXPRODUCTS_DB_USER=wxproducts
          WXPRODUCTS_DB_PASSWORD=${WXPRODUCTS_DB_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG=staging
          GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          WEB_TAG=staging
          SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
          RESEND_API_KEY=${RESEND_API_KEY}
          WXWATCH_DB_URL=postgresql://wxwatch:${WXWATCH_DB_PASSWORD}@db:5432/wxwatch_staging
          WXPRODUCTS_DB_URL=postgresql://wxproducts:${WXPRODUCTS_DB_PASSWORD}@db:5432/wxproducts_staging
          EMAIL=${EMAIL}
          USERNAME=${USERNAME}
          HASHED_PASSWORD=${HASHED_PASSWORD}
          SENTRY_DSN=${SENTRY_DSN:-}
          PROJECT_NAME=Grenmet API
          BACKEND_CORS_ORIGINS=https://auth.staging.barrels.gd,https://admin.staging.barrels.gd,https://hurricane.staging.barrels.gd,https://spice.staging.barrels.gd
          SESSION_COOKIE_DOMAIN=.staging.barrels.gd
          EMAILS_FROM_EMAIL=noreply@weather.gd
          REDIS_URL=redis://redis:6379/0
          STORAGE_ENDPOINT_URL=${STORAGE_ENDPOINT_URL:-}
          STORAGE_REGION=${STORAGE_REGION:-}
          STORAGE_BUCKET=${STORAGE_BUCKET:-}
          STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID:-}
          STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY:-}
          STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL:-}
          EOF

          sed -i 's/^[[:space:]]*//' .env
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|PASSWORD|HASHED_PASSWORD|RESEND_API_KEY|SENTRY_DSN)=.*/\1=****/' .env

      - name: Validate compose configuration
        run: docker compose --env-file .env -f docker-compose.staging.yml config >/dev/null

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Stop existing staging stack
        run: |
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" down --remove-orphans || true

      - name: Pull images
        run: |
          set -euo pipefail
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" pull \
            api db proxy prestart adminer || true
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" pull \
            web-auth web-admin web-migrate web-hurricaneplan web-spicewx || true

      - name: Deploy full staging stack
        run: |
          set -euo pipefail
          # --pull always: never reuse a stale cached image (e.g. web-admin); always
          # fetch the freshly-built tag so the droplet runs the latest code.
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" up -d --pull always --remove-orphans
          echo "=== Service status ===" ; docker compose -p "grenmet-staging" ps || true

      - name: Health checks
        run: |
          echo "=== API health check ==="
          PASSED=false
          for i in {1..10}; do
            if curl -f -s "https://api.staging.barrels.gd/api/v1/utils/health-check/" > /dev/null; then
              echo "Staging API health check passed"; PASSED=true; break
            fi
            echo "Attempt $i/10..."; sleep 10
          done
          [ "$PASSED" = true ] || { echo "::error::API health check failed"; exit 1; }

          echo "=== Auth app health check ==="
          curl -sSo /dev/null -w "%{http_code}" https://auth.staging.barrels.gd/ || echo "Auth staging health check failed"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -p "grenmet-staging" ps || true
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" logs --no-color --tail=100 prestart || true
          docker compose --env-file .env -f docker-compose.staging.yml -p "grenmet-staging" logs --no-color --tail=100 api || true

      - name: Cleanup
        if: always()
        run: |
          docker image prune -f || true
          rm -f .env
