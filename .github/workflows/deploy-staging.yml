name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - "Build and Push Docker Images"
    types:
      - completed
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    # Gate: only run when build-images succeeded, or on manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    # Do not deploy in the main repository, only in user projects
    runs-on:
      - self-hosted
      - staging
    timeout-minutes: 20
    environment:
      name: staging
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api/fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false # preserve any pre-existing workspace files if present

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          cat > .env <<EOF
          ENVIRONMENT=staging
          DOMAIN=staging.api.weather.gd
          STACK_NAME=barrels-api-staging
          PROJECT_NAME=barrels-api-staging
          POSTGRES_DB=app_staging
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=grenmet/barrels-api
          TAG=staging
          SENTRY_DSN=
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

          echo "PROJECT_NAME=barrels-api-staging" >> "$GITHUB_ENV"
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|POSTGRES_PASSWORD|FIRST_SUPERUSER_PASSWORD)=.*/\1=****/' .env

      - name: Validate compose configuration
        run: |
          set -euo pipefail
          docker compose --env-file .env -f docker-compose.staging.yml config >/dev/null

      - name: Authenticate with GHCR
        env:
          GHCR_USERNAME: grenmet
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "ERROR: GHCR_PAT secret is not configured for this workflow." >&2
            exit 1
          fi
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          echo "Authenticated to ghcr.io as $GHCR_USERNAME"

      - name: Stop existing staging stack
        run: |
          set -euo pipefail
          echo "Stopping any existing services for project ${{ env.PROJECT_NAME }}..."
          docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" down --remove-orphans || true
          echo "Existing services stopped (if any)."

      - name: Pull images from registry
        run: |
          set -euxo pipefail
          echo "Pulling images from GitHub Container Registry..."
          docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" pull
          echo "Images pulled successfully"

      - name: Deploy with Docker Compose
        run: |
          echo "🚀 Deploying to staging..."
          echo "INFO Deployment configuration:"
          echo "  - Environment: .env (from GitHub Secrets)"
          echo "  - Project: ${{ env.PROJECT_NAME }}"
          echo "  - Domain: staging.api.weather.gd"

          # Deploy with error handling
          if docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" up -d; then
            echo "SUCCESS Services started successfully"
          else
            echo "ERROR Failed to start services"
            echo "=== Service Status ==="
            docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" ps || true
            echo "=== Service Logs ==="
            docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" logs --tail=50 || true
            exit 1
          fi

          echo "⏳ Waiting for services to be ready..."
          sleep 30

          echo "Checking Checking deployment status..."
          docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" ps

          echo "🏥 Performing health check..."
          # Wait for API to be ready with better error reporting
          HEALTH_CHECK_PASSED=false
          for i in {1..10}; do
            echo "Health check attempt $i/10..."
            if curl -f -s "https://staging.api.weather.gd/api/v1/utils/health-check/" > /dev/null; then
              echo "SUCCESS Staging API health check passed"
              HEALTH_CHECK_PASSED=true
              break
            else
              echo "ERROR Health check failed (attempt $i/10)"
              if [ $i -eq 5 ]; then
                echo "=== Mid-deployment debugging ==="
                echo "=== API Logs (last 30 lines) ==="
                docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" logs --tail=30 api || true
                echo "=== Service Status ==="
                docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" ps || true
              fi
              echo "⏳ Waiting 10 seconds before next attempt..."
              sleep 10
            fi
          done

          if [ "$HEALTH_CHECK_PASSED" = false ]; then
            echo "ERROR Health check failed after 10 attempts"
            echo "=== Final debugging information ==="
            echo "=== All Service Logs ==="
            docker compose --env-file .env -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" logs --tail=100 || true
            echo "=== Network connectivity test ==="
            curl -v "https://staging.api.weather.gd/api/v1/utils/health-check/" || true
            exit 1
          fi

      - name: Show logs on failure
        if: failure()
        run: |
          echo "🚨 STAGING DEPLOYMENT FAILED - DEBUGGING INFO"
          echo "=============================================="
          echo "=== Docker Container Status ==="
          docker ps -a || true
          echo ""
          echo "=== Docker Compose Status ==="
          docker compose -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" ps || true
          echo ""
          echo "=== Prestart Logs (last 200 lines) ==="
          docker compose -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" logs --no-color --tail=200 prestart || true
          echo ""
          echo "=== Database Logs (last 200 lines) ==="
          docker compose -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" logs --no-color --tail=200 db || true
          echo ""
          echo "=== API Logs (last 200 lines) ==="
          docker compose -f docker-compose.staging.yml -p "${{ env.PROJECT_NAME }}" logs --no-color --tail=200 api || true
          echo ""
          echo "=== Environment File (sanitized) ==="
          sed -E 's/(SECRET_KEY|POSTGRES_PASSWORD|FIRST_SUPERUSER_PASSWORD)=.*/\1=****/' .env || true
          echo ""
          echo "=== Network Status ==="
          docker network ls || true
          echo ""
          echo "=== Volume Status ==="
          docker volume ls | grep "${{ env.PROJECT_NAME }}" || true

      - name: Cleanup runner environment
        if: always()
        run: |
          echo "🧹 Cleaning up staging runner environment..."
          # Clean up Docker resources
          docker system prune -af --volumes || true
          # Remove any temporary files
          rm -rf /tmp/* || true
          # Clear any sensitive environment variables
          unset SECRET_KEY POSTGRES_PASSWORD FIRST_SUPERUSER_PASSWORD || true
          echo "✅ Staging runner cleanup completed"
