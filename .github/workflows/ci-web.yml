name: CI — Web Apps

on:
  push:
    branches: [main, staging, dev]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "biome.jsonc"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main, staging, dev]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "biome.jsonc"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Biome lint/format check (fast, runs on all web code)
  biome:
    name: Biome Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node

      - name: Run Biome CI
        run: pnpm check:ci

  # Job 2: TypeScript type-check (all web apps in parallel via Turbo)
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node

      - name: Type-check all web apps
        run: pnpm type-check

  # Job 3: Peer dependency audit (strict mode — catches version mismatches)
  peer-check:
    name: Peer Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm (strict peers)
        uses: ./.github/actions/setup-node
        with:
          strict-peer-dependencies: "true"

  # Job 4: Build all web apps (validates no build errors)
  build:
    name: Build Web Apps
    needs: [biome, type-check, peer-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node

      - name: Build all web apps
        env:
          # wxproducts + wxwatch validate DATABASE_URL at build time via @t3-oss/env-nextjs
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          # admin-gms validates RESEND_API_KEY at build time via @t3-oss/env-nextjs
          RESEND_API_KEY: re_placeholder
        run: pnpm build
