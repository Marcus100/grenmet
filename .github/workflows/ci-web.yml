name: CI — Web Apps

on:
  # No paths filter anywhere. Flow is dev → (PR) → staging → (PR) → main; those
  # promotion PRs are integration gates that must not skip checks (a path-skipped
  # required check also deadlocks the PR). Full suite on every push and PR to a
  # long-lived branch keeps the gates honest and safe to mark "required".
  # No staging push trigger: pipeline-staging calls this workflow on staging
  # pushes (Phase 3c cutover), so a standalone run would be a duplicate.
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, staging, dev]
  workflow_call:

# Hardcoded per-file prefix: inside a workflow_call child, github.workflow is the
# CALLER's name, so a ${{ github.workflow }} group makes sibling children cancel
# each other. PR runs dedupe per PR; push/called runs are unique per run.
concurrency:
  group: ci-web-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job 1: Biome lint/format check (fast, runs on all web code)
  biome:
    name: Biome Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node

      - name: Run Biome CI
        run: pnpm check:ci

  # Job 2: TypeScript type-check (all web apps in parallel via Turbo)
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node

      - name: Type-check all web apps
        run: pnpm type-check

  # Job 3: Peer dependency audit (strict mode — catches version mismatches)
  peer-check:
    name: Peer Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm (strict peers)
        uses: ./.github/actions/setup-node
        with:
          strict-peer-dependencies: "true"

  # Job 4: Build all web apps (validates no build errors)
  build:
    name: Build Web Apps
    needs: [biome, type-check, peer-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node

      - name: Build all web apps
        env:
          # admin-gms validates RESEND_API_KEY at build time via @t3-oss/env-nextjs.
          # Its WXWATCH/WXPRODUCTS_DATABASE_URL are optional, so no DB URL is needed here.
          RESEND_API_KEY: re_placeholder
        run: pnpm build
