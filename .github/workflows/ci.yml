# Continuous Integration Workflow
# Runs on every push and pull request to ensure code quality

name: CI

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
      - staging
      - dev
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/ci.yml"

# Cancel in-progress runs when a new workflow on the same PR is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  # Job 1: Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api/fastapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Linter)
        run: uv run ruff check src scripts

      - name: Run Ruff (Formatter Check)
        run: uv run ruff format src scripts --check

      - name: Run mypy (Type Checker)
        run: |
          echo "Checking Running type checker..."
          if uv run mypy src; then
            echo "SUCCESS: Type checking passed"
          else
            echo "WARNING Type checking found issues (non-blocking for now)"
            echo "INFO Type issues summary:"
            uv run mypy src --show-error-codes || true
          fi
        continue-on-error: true # Don't fail on type errors initially

  # Job 2: Security Checks
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "apps/api/fastapi"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # Job 3: Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
      FIRST_SUPERUSER: admin@barrels.gd
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
      ENVIRONMENT: local
      PROJECT_NAME: FastAPI Backend (Test)
      EMAILS_FROM_EMAIL: test@barrels.gd
      SMTP_HOST: smtp.barrels.gd
    defaults:
      run:
        working-directory: apps/api/fastapi

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          SECRET_KEY: test-secret-key-min-32-characters-long
          FIRST_SUPERUSER: admin@barrels.gd
          FIRST_SUPERUSER_PASSWORD: changethis
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          SECRET_KEY: test-secret-key-min-32-characters-long
          FIRST_SUPERUSER: admin@barrels.gd
          FIRST_SUPERUSER_PASSWORD: changethis
        run: |
          echo "🧪 Running test suite with coverage..."
          echo "INFO Test environment:"
          echo "  - Database: $POSTGRES_SERVER:$POSTGRES_PORT/$POSTGRES_DB"
          echo "  - User: $POSTGRES_USER"
          echo "  - Superuser: $FIRST_SUPERUSER"

          # Run tests with detailed output
          if uv run coverage run --source=src -m pytest -v --tb=short; then
            echo "SUCCESS All tests passed"
          else
            echo "ERROR Some tests failed"
            echo "INFO Test failure summary:"
            uv run pytest --tb=short -v --maxfail=5 || true
            echo "INFO Failed test details:"
            uv run pytest --tb=long --maxfail=3 || true
            exit 1
          fi

          echo "REPORT Generating coverage report..."
          uv run coverage report --show-missing
          uv run coverage xml
          uv run coverage html

          # Show coverage summary
          echo "📈 Coverage Summary:"
          COVERAGE_LINE=$(uv run coverage report --show-missing | tail -n 1)
          echo "$COVERAGE_LINE"

          # Extract coverage percentage for potential threshold checking
          COVERAGE_PCT=$(echo "$COVERAGE_LINE" | grep -o '[0-9]\+%' | head -1 | sed 's/%//')
          if [ -n "$COVERAGE_PCT" ]; then
            echo "REPORT Coverage percentage: $COVERAGE_PCT%"
            if [ "$COVERAGE_PCT" -lt 80 ]; then
              echo "WARNING Warning: Coverage is below 80%"
            fi
          fi

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: apps/api/fastapi/htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/fastapi/coverage.xml
          fail_ci_if_error: false

  # Job 4: Docker Build Test
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test)
        uses: docker/build-push-action@v6
        with:
          context: apps/api/fastapi
          file: apps/api/fastapi/Dockerfile.prod
          push: false
          tags: test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/test-image.tar

      - name: Load Docker image for scanning
        run: |
          echo "Loading Docker image for vulnerability scanning..."
          docker load -i /tmp/test-image.tar
          echo "SUCCESS Image loaded successfully"

      - name: Scan Docker image for vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "test-image:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          scanners: "vuln"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Validate Docker image
        run: |
          echo "Validating Docker image functionality..."
          # Test that the image can be created and basic commands work
          echo "INFO Testing image creation..."
          CONTAINER_ID=$(docker create test-image:latest)
          echo "SUCCESS Container created successfully: $CONTAINER_ID"

          # Test basic image properties
          echo "INFO Image information:"
          docker inspect test-image:latest --format='{{.Config.WorkingDir}}' || true
          docker inspect test-image:latest --format='{{.Config.ExposedPorts}}' || true

          # Clean up
          docker rm $CONTAINER_ID
          docker rmi test-image:latest
          echo "SUCCESS Docker image validation completed"

  # Job 5: API Documentation Check
  docs:
    name: API Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
      FIRST_SUPERUSER: admin@barrels.gd
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
      ENVIRONMENT: local
      PROJECT_NAME: FastAPI Backend (Test)
      EMAILS_FROM_EMAIL: test@barrels.gd
      SMTP_HOST: smtp.barrels.gd
    defaults:
      run:
        working-directory: apps/api/fastapi

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate OpenAPI schema
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          SECRET_KEY: test-secret-key-min-32-characters-long
          FIRST_SUPERUSER: admin@barrels.gd
          FIRST_SUPERUSER_PASSWORD: changethis
        run: |
          uv run python -c "
          from src.main import app
          import json
          with open('openapi.json', 'w') as f:
              json.dump(app.openapi(), f, indent=2)
          "

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: apps/api/fastapi/openapi.json
          retention-days: 30

  # Final status check
  ci-success:
    name: CI Success
    needs: [quality, security, test, docker, docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs
        run: |
          echo "Checking Checking CI job results..."
          echo "Quality: ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "Docs: ${{ needs.docs.result }}"

          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.docker.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ]; then
            echo "ERROR One or more CI jobs failed"
            echo "🚫 CI pipeline failed - deployment blocked"
            exit 1
          fi
          echo "SUCCESS All CI checks passed!"
          echo "🚀 Ready for deployment"
