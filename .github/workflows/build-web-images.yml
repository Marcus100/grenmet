name: Build Web App Images

# Phase 3c cutover: no standalone push/workflow_run triggers anymore. Staging
# builds run as workflow_call children of pipeline-staging (which gates them on
# CI via `needs:` and path-filters via its `changes` job). Release/dispatch
# remain for prod tags and manual rebuilds.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (staging or latest)"
        required: true
        type: choice
        options:
          - staging
          - latest
  # Callable from pipeline workflows (Phase 3 restructure). When called, the
  # caller's event context drives tag resolution; `tag` overrides it explicitly.
  workflow_call:
    inputs:
      tag:
        description: "Image tag override (staging or latest)"
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    # push = called from pipeline-staging on a staging push (caller's event).
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web-auth
            path: apps/web/auth
            port: 3000
          - app: web-admin
            path: apps/web/admin-gms
            port: 3001
          # Migration runner image — folds the former wxwatch/wxproducts apps'
          # Drizzle migrations into a one-off image driven from admin's Dockerfile.
          - app: web-admin-migrate
            path: apps/web/admin-gms
            target: migrate
          - app: web-hurricaneplan
            path: apps/web/hurricaneplan
            port: 3002
          - app: web-spicewx
            path: apps/web/spicewx
            port: 3003

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve environment context
        id: ctx
        run: |
          EVENT="${{ github.event_name }}"
          # inputs.tag covers both workflow_dispatch and workflow_call callers.
          if [ -n "${{ inputs.tag }}" ]; then
            BRANCH="${{ inputs.tag }}"
          elif [ "$EVENT" == "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [ "$BRANCH" == "staging" ] && [ "$EVENT" != "release" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "api_url=https://api.staging.barrels.gd" >> $GITHUB_OUTPUT
            echo "sentry_project=grenmet-staging" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "api_url=https://api.barrels.gd" >> $GITHUB_OUTPUT
            echo "sentry_project=grenmet-production" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/grenmet-${{ matrix.app }}
          tags: |
            type=raw,value=staging,enable=${{ steps.ctx.outputs.environment == 'staging' }}
            type=raw,value=latest,enable=${{ steps.ctx.outputs.environment == 'production' }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          target: ${{ matrix.target }}
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.ctx.outputs.api_url }}
            NEXT_PUBLIC_ENVIRONMENT=${{ steps.ctx.outputs.environment }}
            NEXT_PUBLIC_SENTRY_DSN=${{ steps.ctx.outputs.environment == 'staging' && secrets.SENTRY_DSN_STAGING || secrets.SENTRY_DSN_PRODUCTION }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=${{ steps.ctx.outputs.environment }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max,ignore-error=true
          platforms: linux/amd64

      # Report-only vulnerability scan (mirrors the API pipeline). continue-on-error
      # keeps it non-blocking for now; results land in the Security tab per app.
      - name: Scan image for vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/grenmet-${{ matrix.app }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: vuln

      - name: Upload Trivy results to GitHub Security tab
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.app }}

      - name: Summary
        run: echo "Built and pushed ${{ steps.meta.outputs.tags }}"
