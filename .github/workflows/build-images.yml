name: Build and Push Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - staging
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (staging or latest)"
        required: true
        type: choice
        options:
          - staging
          - latest

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    # Run on master push (for staging) or release (for production) or manual dispatch.
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'release' && github.event.action == 'published')
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for semver tag extraction

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            # Production release: tag with 'latest' and release version
            RELEASE_VERSION="${{ github.event.release.tag_name }}"
            echo "primary_tag=latest" >> $GITHUB_OUTPUT
            echo "version_tag=$RELEASE_VERSION" >> $GITHUB_OUTPUT
            echo "Building latest and $RELEASE_VERSION tags for production release"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger: use specified tag
            TAG="${{ github.event.inputs.tag }}"
            echo "primary_tag=$TAG" >> $GITHUB_OUTPUT
            echo "version_tag=" >> $GITHUB_OUTPUT
            echo "Building $TAG tag (manual trigger)"
          else
            # workflow_run on master branch -> staging
            echo "primary_tag=staging" >> $GITHUB_OUTPUT
            echo "version_tag=" >> $GITHUB_OUTPUT
            echo "Building staging tag for master branch"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/api/fastapi
          file: apps/api/fastapi/Dockerfile.prod
          pull: true
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.primary_tag }}
            ${{ steps.tags.outputs.version_tag != '' && format('ghcr.io/{0}:{1}', github.repository, steps.tags.outputs.version_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          platforms: linux/amd64

      - name: Image digest and tags summary
        run: |
          echo "✅ grenmet-api image built and pushed successfully"
          echo "Registry: ghcr.io/${{ github.repository }}"
          echo "Primary tag: ${{ steps.tags.outputs.primary_tag }}"
          if [ -n "${{ steps.tags.outputs.version_tag }}" ]; then
            echo "Version tag: ${{ steps.tags.outputs.version_tag }}"
          fi
