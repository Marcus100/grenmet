# Continuous Integration Workflow
# Runs on every push and pull request to ensure code quality

name: CI

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches:
      - main
      - staging
      - dev
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/ci-api.yml"

# Cancel in-progress runs when a new workflow on the same PR is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  # Job 1: Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api/fastapi

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-local-path: ~/.cache/uv

      - name: Install dependencies
        # --frozen: install exactly what's in uv.lock (same as the prod image).
        # Fails CI if uv.lock is out of sync with pyproject.toml — catching the
        # dependency drift that otherwise only surfaces as a crash in production.
        run: uv sync --frozen

      - name: Run Ruff (Linter)
        run: uv run ruff check src scripts

      - name: Run Ruff (Formatter Check)
        run: uv run ruff format src scripts --check

      - name: Run mypy (Type Checker)
        run: uv run mypy src

  # Job 2: Security Checks
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "apps/api/fastapi"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5

        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # Job 3: Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
      FIRST_SUPERUSER: admin@weather.gd
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: test-secret-key-min-32-characters-long
      ENVIRONMENT: local
      PROJECT_NAME: FastAPI Backend (Test)
      EMAILS_FROM_EMAIL: test@weather.gd
      SMTP_HOST: smtp.weather.gd
    defaults:
      run:
        working-directory: apps/api/fastapi

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-local-path: ~/.cache/uv

      - name: Install dependencies
        # --frozen: install exactly what's in uv.lock (same as the prod image).
        # Fails CI if uv.lock is out of sync with pyproject.toml — catching the
        # dependency drift that otherwise only surfaces as a crash in production.
        run: uv sync --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: |
          uv run coverage run --source=src -m pytest -v --tb=short
          uv run coverage report --show-missing
          uv run coverage xml
          uv run coverage html

      - name: Upload coverage HTML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: apps/api/fastapi/htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          file: apps/api/fastapi/coverage.xml
          fail_ci_if_error: false

  # Job 4: Docker Build Test
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (test)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0

        with:
          context: apps/api/fastapi
          file: apps/api/fastapi/Dockerfile.prod
          push: false
          tags: test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/test-image.tar

      - name: Load Docker image for scanning
        run: |
          echo "Loading Docker image for vulnerability scanning..."
          docker load -i /tmp/test-image.tar
          echo "SUCCESS Image loaded successfully"

      - name: Smoke test — prod image boots and imports the full app
        # Runs the actual production image and imports the whole FastAPI app
        # (all routers/services/deps). Catches crash-on-boot — e.g. a missing
        # dependency — in the exact artifact that gets deployed, before release.
        run: |
          docker run --rm --entrypoint sh \
            -e PROJECT_NAME=ci \
            -e SECRET_KEY=ci-secret-key-min-32-characters-long \
            -e POSTGRES_SERVER=db -e POSTGRES_PORT=5432 \
            -e POSTGRES_USER=app -e POSTGRES_PASSWORD=ci -e POSTGRES_DB=app \
            -e FIRST_SUPERUSER=ci@weather.gd -e FIRST_SUPERUSER_PASSWORD=changethis-ci \
            test-image:latest \
            -lc 'uv run python -c "from src.main import app; print(\"boot-ok: app + routers imported\")"'

      - name: Scan Docker image for vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "test-image:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          scanners: "vuln"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5

        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Validate Docker image
        run: |
          echo "Validating Docker image functionality..."
          # Test that the image can be created and basic commands work
          echo "INFO Testing image creation..."
          CONTAINER_ID=$(docker create test-image:latest)
          echo "SUCCESS Container created successfully: $CONTAINER_ID"

          # Test basic image properties
          echo "INFO Image information:"
          docker inspect test-image:latest --format='{{.Config.WorkingDir}}' || true
          docker inspect test-image:latest --format='{{.Config.ExposedPorts}}' || true

          # Clean up
          docker rm $CONTAINER_ID
          docker rmi test-image:latest
          echo "SUCCESS Docker image validation completed"

  # Job 5: API Documentation Check
  # Note: no database service needed — app.openapi() reads route definitions only
  docs:
    name: API Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
      FIRST_SUPERUSER: admin@weather.gd
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: test-secret-key-min-32-characters-long
      ENVIRONMENT: local
      PROJECT_NAME: FastAPI Backend (Test)
      EMAILS_FROM_EMAIL: test@weather.gd
      SMTP_HOST: smtp.weather.gd
    defaults:
      run:
        working-directory: apps/api/fastapi

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-local-path: ~/.cache/uv

      - name: Install dependencies
        # --frozen: install exactly what's in uv.lock (same as the prod image).
        # Fails CI if uv.lock is out of sync with pyproject.toml — catching the
        # dependency drift that otherwise only surfaces as a crash in production.
        run: uv sync --frozen

      - name: Generate OpenAPI schema
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changethis
          SECRET_KEY: test-secret-key-min-32-characters-long
          FIRST_SUPERUSER: admin@weather.gd
          FIRST_SUPERUSER_PASSWORD: changethis
        run: |
          uv run python -c "
          from src.main import app
          import json
          with open('openapi.json', 'w') as f:
              json.dump(app.openapi(), f, indent=2)
          "

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-schema
          path: apps/api/fastapi/openapi.json
          retention-days: 30

  # Final status check
  ci-success:
    name: CI Success
    needs: [quality, security, test, docker, docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs
        run: |
          echo "Checking Checking CI job results..."
          echo "Quality: ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "Docs: ${{ needs.docs.result }}"

          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.docker.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ]; then
            echo "ERROR One or more CI jobs failed"
            echo "🚫 CI pipeline failed - deployment blocked"
            exit 1
          fi
          echo "SUCCESS All CI checks passed!"
          echo "🚀 Ready for deployment"
