name: Test Docker Compose

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/test-docker-compose.yml"
  pull_request:
    branches:
      - main
      - staging
      - dev
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/test-docker-compose.yml"
    types:
      - opened
      - synchronize

jobs:
  test-docker-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    defaults:
      run:
        working-directory: apps/api/fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow prerequisites
        run: |
          echo "Checking Validating workflow prerequisites..."

          # Check required files exist
          echo "📁 Checking required files..."
          for file in docker-compose.yml docker-compose.override.yml .env.local.example; do
            if [ -f "$file" ]; then
              echo "SUCCESS $file exists"
            else
              echo "ERROR $file missing"
              exit 1
            fi
          done

          # Check Docker is available
          echo "🐳 Checking Docker availability..."
          if docker --version; then
            echo "SUCCESS Docker is available"
          else
            echo "ERROR Docker not available"
            exit 1
          fi

          # Check Docker Compose is available
          if docker compose version; then
            echo "SUCCESS Docker Compose is available"
          else
            echo "ERROR Docker Compose not available"
            exit 1
          fi

          echo "SUCCESS All prerequisites validated"
      - name: Prepare .env for CI
        run: |
          set -euo pipefail
          echo "Checking Checking for environment template files..."
          if [ ! -f .env.local.example ]; then
            echo "ERROR ERROR: .env.local.example not found in repository"
            echo "📁 Available .env files:"
            ls -la .env* 2>/dev/null || echo "No .env files found"
            exit 1
          fi
          echo "SUCCESS Found .env.local.example, creating .env for CI..."
          cp .env.local.example .env
          sed -i 's/^ENVIRONMENT=.*/ENVIRONMENT=local/' .env
          grep -q '^SECRET_KEY=' .env || echo 'SECRET_KEY=changethis' >> .env
          grep -q '^POSTGRES_PASSWORD=' .env || echo 'POSTGRES_PASSWORD=changethis' >> .env
          if grep -q '^SENTRY_DSN=' .env; then sed -i 's/^SENTRY_DSN=.*/SENTRY_DSN=/' .env; else echo 'SENTRY_DSN=' >> .env; fi
          echo "SUCCESS .env file prepared successfully"

          # Extract PROJECT_NAME for consistent container naming
          PROJECT_NAME=$(grep '^PROJECT_NAME=' .env | cut -d'=' -f2- | tr -d '\r' || echo "fast-back")
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
          echo "Using PROJECT_NAME: $PROJECT_NAME"
      - name: Validate compose configuration
        run: docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml config >/dev/null
      - name: Authenticate with GHCR
        env:
          GHCR_USERNAME: grenmet
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "GHCR_PAT secret not provided; skipping GHCR login."
          else
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            echo "Authenticated to ghcr.io as $GHCR_USERNAME"
          fi
      - name: Pull base images
        run: |
          set -euo pipefail
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml pull || true
      - name: Create traefik network (CI)
        run: docker network create traefik-public || true
      - name: Build with Docker Compose
        run: docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml build --pull
      - name: Clean up any existing containers
        run: docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml down -v --remove-orphans
      - name: Start services (CI configuration)
        run: |
          # Use override file to get the correct port mapping and configuration
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml up -d db
          # Wait for database to be healthy
          echo "Waiting for database to be healthy..."
          timeout 60 bash -c 'until docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps db | grep -q healthy; do sleep 2; done'

          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml up -d prestart
          # Wait for prestart to complete with better error handling
          echo "Waiting for prestart to complete..."
          if timeout 180 bash -c 'until docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps prestart | grep -q exited; do
            echo "Prestart still running... checking status..."
            docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps prestart
            sleep 5
          done'; then
            echo "SUCCESS Prestart completed within timeout"
          else
            echo "WARNING Prestart timed out after 3 minutes, checking status..."
            echo "=== Prestart Logs (last 50 lines) ==="
            docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=50 prestart
            echo "=== Current Container Status ==="
            docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps
            echo "=== Attempting to continue anyway... ==="
          fi

          # Check if prestart completed successfully by examining logs
          echo "Checking prestart completion status..."
          if docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs prestart | grep -q "Prestart script completed successfully"; then
            echo "SUCCESS Prestart completed successfully based on logs"
          else
            echo "ERROR Prestart did not complete successfully"
            echo "=== Prestart Logs ==="
            docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs prestart
            echo "=== Container Status ==="
            docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps prestart
            exit 1
          fi

          # Additional validation: Check container state
          PRESTART_STATUS=$(docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps prestart --format "{{.State}}" | head -1)
          echo "Prestart container state: $PRESTART_STATUS"

          if [[ "$PRESTART_STATUS" == *"exited"* ]]; then
            echo "SUCCESS Prestart container exited properly"
          else
            echo "WARNING Prestart container state: $PRESTART_STATUS (may be expected in some cases)"
          fi

          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml up -d api
          # Wait for API to start and be ready
          echo "Waiting for API to be ready..."
          sleep 10

          # Show container status for debugging
          echo "=== Container Status ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps

          # Show API logs for debugging
          echo "=== API Logs (last 20 lines) ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=20 api
      - name: Test API is up
        run: |
          echo "Testing API health check endpoint..."
          # Retry logic for the health check with better error reporting
          for i in {1..5}; do
            echo "Attempt $i/5..."
            if curl -f -s http://localhost:8000/api/v1/utils/health-check/; then
              echo "SUCCESS API health check successful!"
              exit 0
            else
              echo "ERROR Health check failed (attempt $i/5), waiting 3 seconds..."
              # Show API logs on failure for debugging
              if [ $i -eq 5 ]; then
                echo "=== API Logs (last 20 lines) - Mid-attempt debugging ==="
                docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=20 api || true
              fi
              sleep 3
            fi
          done
          echo "ERROR All health check attempts failed"
          echo "=== Final debugging information ==="
          echo "=== Container Status ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps || true
          echo "=== API Logs (last 50 lines) ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=50 api || true
          echo "=== Network connectivity test ==="
          curl -v http://localhost:8000/api/v1/utils/health-check/ || true
          exit 1
      - name: Clean up
        if: always()
        run: |
          echo "🧹 Cleaning up Docker resources..."
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml down -v --remove-orphans || true
          echo "SUCCESS Cleanup completed"

      - name: Show detailed logs on failure
        if: failure()
        run: |
          echo "🚨 DOCKER COMPOSE TEST FAILED - COMPREHENSIVE DEBUGGING"
          echo "======================================================"
          echo "=== Environment Information ==="
          echo "PROJECT_NAME: ${{ env.PROJECT_NAME }}"
          echo "GitHub Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "=== Docker System Information ==="
          docker --version || true
          docker compose version || true
          docker system df || true
          echo ""
          echo "=== All Container Status ==="
          docker ps -a || true
          echo ""
          echo "=== Docker Compose Status ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps || true
          echo ""
          echo "=== Environment File (sanitized) ==="
          sed -n '1,50p' .env | sed -E 's/(SECRET_KEY|POSTGRES_PASSWORD|FIRST_SUPERUSER_PASSWORD)=.*/\1=****/' || true
          echo ""
          echo "=== Database Logs (last 100 lines) ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=100 db || true
          echo ""
          echo "=== Prestart Logs (last 100 lines) ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=100 prestart || true
          echo ""
          echo "=== API Logs (last 100 lines) ==="
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs --tail=100 api || true
          echo ""
          echo "=== Network Information ==="
          docker network ls || true
          docker network inspect "${{ env.PROJECT_NAME }}_default" || true
          echo ""
          echo "=== Volume Information ==="
          docker volume ls | grep "${{ env.PROJECT_NAME }}" || true
          echo ""
          echo "=== Port Usage ==="
          netstat -tlnp | grep -E ':(8000|5432)' || true
      - name: Collect compose logs
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml logs > diagnostics/compose.log || true
          docker compose --env-file .env -p "${{ env.PROJECT_NAME }}" -f docker-compose.yml -f docker-compose.override.yml ps > diagnostics/compose.ps || true
      - name: Upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-diagnostics
          path: apps/api/fastapi/diagnostics/
