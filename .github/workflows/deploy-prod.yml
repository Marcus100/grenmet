name: Deploy to Production

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [ self-hosted, production ]
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: infra/docker
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1
        with:
          ref: ${{ github.ref }}

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          WXWATCH_DB_PASSWORD: ${{ secrets.WXWATCH_DB_PASSWORD }}
          WXPRODUCTS_DB_PASSWORD: ${{ secrets.WXPRODUCTS_DB_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          USERNAME: ${{ secrets.USERNAME }}
          HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STORAGE_ENDPOINT_URL: ${{ secrets.STORAGE_ENDPOINT_URL }}
          STORAGE_REGION: ${{ secrets.STORAGE_REGION }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          STORAGE_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
          STORAGE_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
          STORAGE_PUBLIC_BASE_URL: ${{ secrets.STORAGE_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          API_TAG="${RELEASE_TAG:-latest}"

          cat > .env <<EOF
          ENVIRONMENT=production
          DOMAIN=api.barrels.gd
          POSTGRES_DB=app_prod
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          WXWATCH_DB_NAME=wxwatch
          WXWATCH_DB_USER=wxwatch
          WXWATCH_DB_PASSWORD=${WXWATCH_DB_PASSWORD}
          WXPRODUCTS_DB_NAME=wxproducts
          WXPRODUCTS_DB_USER=wxproducts
          WXPRODUCTS_DB_PASSWORD=${WXPRODUCTS_DB_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG=${API_TAG}
          GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          WEB_TAG=${API_TAG}
          SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
          RESEND_API_KEY=${RESEND_API_KEY}
          WXWATCH_DB_URL=postgresql://wxwatch:${WXWATCH_DB_PASSWORD}@db:5432/wxwatch
          WXPRODUCTS_DB_URL=postgresql://wxproducts:${WXPRODUCTS_DB_PASSWORD}@db:5432/wxproducts
          EMAIL=${EMAIL}
          USERNAME=${USERNAME}
          HASHED_PASSWORD=${HASHED_PASSWORD}
          SENTRY_DSN=${SENTRY_DSN:-}
          PROJECT_NAME=Grenmet API
          BACKEND_CORS_ORIGINS=https://auth.barrels.gd,https://admin.barrels.gd,https://hurricane.barrels.gd,https://spice.barrels.gd
          SESSION_COOKIE_DOMAIN=.barrels.gd
          EMAILS_FROM_EMAIL=noreply@weather.gd
          REDIS_URL=redis://redis:6379/0
          STORAGE_ENDPOINT_URL=${STORAGE_ENDPOINT_URL:-}
          STORAGE_REGION=${STORAGE_REGION:-}
          STORAGE_BUCKET=${STORAGE_BUCKET:-}
          STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID:-}
          STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY:-}
          STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL:-}
          EOF

          sed -i 's/^[[:space:]]*//' .env
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|PASSWORD|HASHED_PASSWORD|RESEND_API_KEY|SENTRY_DSN)=.*/\1=****/' .env

      - name: Validate compose configuration
        run: docker compose --env-file .env -f docker-compose.prod.yml config >/dev/null

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Wait for release images to be published
        # Prevents the release-time race: build-* and deploy both fire on
        # 'release: published'. Block until ALL release-tagged images (API + every
        # web app + the migrate image) actually exist in GHCR (up to 10 min each)
        # before deploying. Waiting for only a subset let a failed web build slip
        # through and then break `up --pull always` mid-deploy on the missing image.
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"; TAG="${TAG:-latest}"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGES=(
            "ghcr.io/${REPO}:${TAG}"
            "ghcr.io/${OWNER}/grenmet-web-auth:${TAG}"
            "ghcr.io/${OWNER}/grenmet-web-admin:${TAG}"
            "ghcr.io/${OWNER}/grenmet-web-admin-migrate:${TAG}"
            "ghcr.io/${OWNER}/grenmet-web-hurricaneplan:${TAG}"
            "ghcr.io/${OWNER}/grenmet-web-spicewx:${TAG}"
          )
          for IMG in "${IMAGES[@]}"; do
            echo "Waiting for $IMG ..."
            for i in $(seq 1 40); do
              if docker manifest inspect "$IMG" >/dev/null 2>&1; then echo "  ✓ ready"; break; fi
              echo "  attempt $i/40 — not published yet, sleeping 15s"; sleep 15
              [ "$i" -eq 40 ] && { echo "::error::$IMG never appeared — did the build fail?"; exit 1; }
            done
          done

      - name: Pull images
        run: |
          set -euo pipefail
          # Pull API image (always exists at this point)
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" pull api db proxy prestart || true
          # Pull web app images (may not exist yet on first deploy — ignore failures)
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" pull \
            web-auth web-admin web-migrate web-hurricaneplan web-spicewx || true

      - name: Start database
        run: |
          set -euo pipefail
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" up -d db
          echo "Waiting for database..."
          for i in {1..20}; do
            if docker inspect --format='{{json .State.Health.Status}}' "grenmet-db-1" 2>/dev/null | grep -q healthy; then
              echo "Database ready"; break
            fi
            echo "Attempt $i/20..."; sleep 3
            [ $i -eq 20 ] && { echo "::error::Database did not become ready"; exit 1; }
          done

      - name: Deploy full stack
        run: |
          set -euxo pipefail
          # --pull always: never reuse a stale cached image; always fetch the
          # freshly-built tag so the droplet runs the latest code.
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" up -d --pull always --remove-orphans
          echo "=== Service status ===" ; docker compose -p "grenmet" ps || true

      - name: Health checks
        run: |
          set -uo pipefail
          COMPOSE="docker compose --env-file .env -f docker-compose.prod.yml -p grenmet"

          echo "=== API health (fatal) ==="
          PASSED=false
          for i in {1..10}; do
            if curl -f -s "https://api.barrels.gd/api/v1/utils/health-check/" >/dev/null; then
              echo "API healthy"; PASSED=true; break
            fi
            echo "attempt $i/10..."; sleep 10
          done
          [ "$PASSED" = true ] || { echo "::error::API health check failed"; exit 1; }

          echo "=== Web app container health (fatal) ==="
          # Gate on each web container's own /api/health (via the compose healthcheck),
          # so a container that boots then fails to serve cannot deploy green.
          for svc in web-auth web-admin web-hurricaneplan web-spicewx; do
            cid=$($COMPOSE ps -q "$svc" 2>/dev/null || true)
            [ -n "$cid" ] || { echo "::error::$svc has no running container"; exit 1; }
            ok=false
            for i in {1..20}; do
              status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid" 2>/dev/null || echo missing)
              case "$status" in
                healthy) ok=true; break ;;
                none) echo "$svc: no healthcheck defined — skipping gate"; ok=true; break ;;
                *) echo "$svc: $status ($i/20)"; sleep 6 ;;
              esac
            done
            [ "$ok" = true ] || { echo "::error::$svc did not become healthy"; exit 1; }
          done

          echo "=== External smoke via Cloudflare (non-fatal) ==="
          for host in auth admin hurricane spice; do
            code=$(curl -4 -sS -o /dev/null -w '%{http_code}' --max-time 15 "https://$host.barrels.gd/" || echo 000)
            echo "  $host.barrels.gd → $code"
          done

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -p "grenmet" ps || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=100 prestart || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=100 api || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=50 db || true

      - name: Cleanup
        if: always()
        run: |
          docker image prune -f || true
          rm -f .env
