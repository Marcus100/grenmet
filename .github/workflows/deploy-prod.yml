name: Deploy to production

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    # Gate: release events (branch protection ensures CI passed on main),
    # or when build-images completed successfully after a release.
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'release')
    runs-on: [self-hosted, production]
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api/fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          EMAIL: ${{ secrets.EMAIL }}
          USERNAME: ${{ secrets.USERNAME }}
          HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          IMAGE_TAG="${RELEASE_TAG:-latest}"

          cat > .env <<EOF
          ENVIRONMENT=production
          DOMAIN=api.weather.gd
          STACK_NAME=grenmet-api
          PROJECT_NAME=grenmet-api
          POSTGRES_DB=app_prod
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=grenmet/grenmet-api
          TAG=${IMAGE_TAG}
          EMAIL=${EMAIL}
          USERNAME=${USERNAME}
          HASHED_PASSWORD=${HASHED_PASSWORD}
          SENTRY_DSN=
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

          echo "PROJECT_NAME=grenmet-api" >> "$GITHUB_ENV"
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|POSTGRES_PASSWORD|FIRST_SUPERUSER_PASSWORD|HASHED_PASSWORD)=.*/\1=****/' .env

      - name: Pull images from registry
        run: |
          set -euxo pipefail
          echo "Pulling images from GitHub Container Registry..."
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" pull
          echo "Images pulled successfully"

      - name: Deploy with Docker Compose
        run: |
          set -euxo pipefail
          echo "Starting database..."
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" up -d db
          echo "Waiting for database to be ready..."
          for i in {1..20}; do
            status=$(docker inspect --format='{{json .State.Health.Status}}' "grenmet-api-db-1" 2>/dev/null || echo null)
            if echo "$status" | grep -q healthy; then echo "Database is ready"; break; fi
            echo "Waiting for database to be ready... ($i/20)"; sleep 3
            if [ $i -eq 20 ]; then
              echo "::error::Database did not become ready in time";
              docker compose -p "grenmet-api" logs db || true
              exit 1
            fi
          done

          echo "Starting all services..."
          set +e
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" up -d --remove-orphans
          up_status=$?
          echo "=== Service status ==="; docker compose -p "grenmet-api" ps || true

          echo -e "\n=== Prestart logs (tail 120) ==="
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs prestart --tail=120 2>&1 || true

          echo -e "\n=== API logs (tail 120) ==="
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs api --tail=120 2>&1 || true

          echo -e "\n=== DB logs (tail 60) ==="
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs db --tail=60 2>&1 || true

          echo -e "\n=== Proxy logs (tail 60) ==="
          docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs proxy --tail=60 2>&1 || true

          echo -e "\n=== Effective .env (sanitized) ==="
          sed -n '1,200p' .env | sed -E 's/(SECRET_KEY|POSTGRES_PASSWORD|FIRST_SUPERUSER_PASSWORD|HASHED_PASSWORD)=.*/\1=****/' || true

          if [ $up_status -ne 0 ]; then
            echo "::error::docker compose up failed with status $up_status";
            exit $up_status
          fi

          # Quick external health check; do not fail the job, just print result
          set -e
          echo -e "\n=== External health check ==="
          curl -sS https://api.weather.gd/api/v1/utils/health-check/ || echo "health-check request failed"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== docker ps ===" && docker ps -a || true
          echo "=== compose ps (grenmet-api) ===" && docker compose -p "grenmet-api" ps || true
          echo "=== prestart logs (tail 400) ===" && docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs --no-color --tail=400 prestart || true
          echo "=== prestart suspected errors ===" && docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs --no-color prestart | grep -iE "(pydantic|validation|sentry|dsn|password|FIRST_SUPERUSER|alembic|traceback|exception)" || true
          echo "=== db logs (tail 200) ===" && docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs --no-color --tail=200 db || true
          echo "=== api logs (tail 200) ===" && docker compose --env-file .env -f ../../infra/docker/docker-compose.prod.yml -p "grenmet-api" logs --no-color --tail=200 api || true
          echo "=== env (sanitized) ===" && sed -n '1,200p' .env | sed -E 's/(SECRET_KEY|POSTGRES_PASSWORD|FIRST_SUPERUSER_PASSWORD|HASHED_PASSWORD)=.*/\1=****/' || true
          echo "=== health check (best effort) ==="; curl -sS https://api.weather.gd/api/v1/utils/health-check/ || true

      - name: Cleanup runner environment
        if: always()
        run: |
          echo "Cleaning up runner environment..."
          # Prune unused images/containers/networks but NOT volumes (protects pgdata)
          docker system prune -af || true
          # Remove any temporary files
          rm -rf /tmp/* || true
          # Clear sensitive environment variables
          unset SECRET_KEY POSTGRES_PASSWORD FIRST_SUPERUSER_PASSWORD HASHED_PASSWORD || true
          echo "Runner cleanup completed"
