name: Deploy to Production

on:
  release:
    types: [ published ]
  workflow_run:
    workflows: [ "Build and Push Docker Images", "Build Web App Images" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Guard: for workflow_run events both build workflows must have recently succeeded
  # on main before we deploy. workflow_run fires once per workflow that finishes,
  # so without this check the deploy could start with one stale image set.
  check-builds:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check both build workflows succeeded
        id: check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            // For release and manual dispatch, always proceed
            if (context.eventName !== 'workflow_run') {
              core.setOutput('ready', 'true');
              return;
            }
            // For workflow_run: both build workflows must have recently succeeded on main
            const workflows = ['Build and Push Docker Images', 'Build Web App Images'];
            let allSuccess = true;
            for (const name of workflows) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'main',
                per_page: 10,
              });
              const recent = data.workflow_runs.find(r => r.name === name && r.conclusion === 'success');
              if (!recent) { allSuccess = false; break; }
            }
            core.setOutput('ready', allSuccess ? 'true' : 'false');

  deploy:
    needs: check-builds
    if: needs.check-builds.outputs.ready == 'true'
    runs-on: [ self-hosted, production ]
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: infra/docker
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          WXWATCH_DB_PASSWORD: ${{ secrets.WXWATCH_DB_PASSWORD }}
          WXPRODUCTS_DB_PASSWORD: ${{ secrets.WXPRODUCTS_DB_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          USERNAME: ${{ secrets.USERNAME }}
          HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          API_TAG="${RELEASE_TAG:-latest}"

          cat > .env <<EOF
          ENVIRONMENT=production
          DOMAIN=api.barrels.gd
          POSTGRES_DB=app_prod
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          WXWATCH_DB_NAME=wxwatch
          WXWATCH_DB_USER=wxwatch
          WXWATCH_DB_PASSWORD=${WXWATCH_DB_PASSWORD}
          WXPRODUCTS_DB_NAME=wxproducts
          WXPRODUCTS_DB_USER=wxproducts
          WXPRODUCTS_DB_PASSWORD=${WXPRODUCTS_DB_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG=${API_TAG}
          GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          WEB_TAG=latest
          SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
          RESEND_API_KEY=${RESEND_API_KEY}
          WXWATCH_DB_URL=postgresql://wxwatch:${WXWATCH_DB_PASSWORD}@db:5432/wxwatch
          WXPRODUCTS_DB_URL=postgresql://wxproducts:${WXPRODUCTS_DB_PASSWORD}@db:5432/wxproducts
          EMAIL=${EMAIL}
          USERNAME=${USERNAME}
          HASHED_PASSWORD=${HASHED_PASSWORD}
          SENTRY_DSN=${SENTRY_DSN:-}
          PROJECT_NAME=Grenmet API
          BACKEND_CORS_ORIGINS=https://auth.barrels.gd,https://admin.barrels.gd,https://wxwatch.barrels.gd,https://wxproducts.barrels.gd,https://hurricane.barrels.gd,https://spice.barrels.gd,https://hr.barrels.gd,https://sales.barrels.gd
          SESSION_COOKIE_DOMAIN=.barrels.gd
          EMAILS_FROM_EMAIL=noreply@weather.gd
          EOF

          sed -i 's/^[[:space:]]*//' .env
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|PASSWORD|HASHED_PASSWORD|RESEND_API_KEY|SENTRY_DSN)=.*/\1=****/' .env

      - name: Validate compose configuration
        run: docker compose --env-file .env -f docker-compose.prod.yml config >/dev/null

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull images
        run: |
          set -euo pipefail
          # Pull API image (always exists at this point)
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" pull api db proxy prestart adminer || true
          # Pull web app images (may not exist yet on first deploy — ignore failures)
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" pull \
            web-auth web-admin web-wxwatch web-hurricaneplan web-spicewx \
            web-wxproducts web-hr web-salesbus 2>/dev/null || true

      - name: Start database
        run: |
          set -euo pipefail
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" up -d db
          echo "Waiting for database..."
          for i in {1..20}; do
            if docker inspect --format='{{json .State.Health.Status}}' "grenmet-db-1" 2>/dev/null | grep -q healthy; then
              echo "Database ready"; break
            fi
            echo "Attempt $i/20..."; sleep 3
            [ $i -eq 20 ] && { echo "::error::Database did not become ready"; exit 1; }
          done

      - name: Deploy full stack
        run: |
          set -euxo pipefail
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" up -d --remove-orphans
          echo "=== Service status ===" ; docker compose -p "grenmet" ps || true

      - name: Health checks
        run: |
          echo "=== API health check ==="
          PASSED=false
          for i in {1..10}; do
            if curl -f -s "https://api.barrels.gd/api/v1/utils/health-check/" > /dev/null; then
              echo "Production API health check passed"; PASSED=true; break
            fi
            echo "Attempt $i/10..."; sleep 10
          done
          [ "$PASSED" = true ] || { echo "::error::API health check failed"; exit 1; }

          echo "=== Auth app health check ==="
          curl -sSo /dev/null -w "%{http_code}" https://auth.barrels.gd/ || echo "Auth health check failed"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -p "grenmet" ps || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=100 prestart || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=100 api || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=50 db || true

      - name: Cleanup
        if: always()
        run: |
          docker image prune -f || true
          rm -f .env
