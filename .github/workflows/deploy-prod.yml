name: Deploy to Production

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Build and Push Docker Images", "Build Web App Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, production]
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: infra/docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          WXWATCH_DB_PASSWORD: ${{ secrets.WXWATCH_DB_PASSWORD }}
          WXPRODUCTS_DB_PASSWORD: ${{ secrets.WXPRODUCTS_DB_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          USERNAME: ${{ secrets.USERNAME }}
          HASHED_PASSWORD: ${{ secrets.HASHED_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          API_TAG="${RELEASE_TAG:-latest}"

          cat > .env <<EOF
          ENVIRONMENT=production
          DOMAIN=api.weather.gd
          POSTGRES_DB=app_prod
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          WXWATCH_DB_NAME=wxwatch
          WXWATCH_DB_USER=wxwatch
          WXWATCH_DB_PASSWORD=${WXWATCH_DB_PASSWORD}
          WXPRODUCTS_DB_NAME=wxproducts
          WXPRODUCTS_DB_USER=wxproducts
          WXPRODUCTS_DB_PASSWORD=${WXPRODUCTS_DB_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          FIRST_SUPERUSER=${FIRST_SUPERUSER}
          FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
          REGISTRY=ghcr.io
          IMAGE_NAME=${{ github.repository }}
          TAG=${API_TAG}
          GHCR_OWNER=${{ github.repository_owner }}
          WEB_TAG=latest
          SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
          RESEND_API_KEY=${RESEND_API_KEY}
          WXWATCH_DB_URL=postgresql://wxwatch:${WXWATCH_DB_PASSWORD}@db:5432/wxwatch
          WXPRODUCTS_DB_URL=postgresql://wxproducts:${WXPRODUCTS_DB_PASSWORD}@db:5432/wxproducts
          EMAIL=${EMAIL}
          USERNAME=${USERNAME}
          HASHED_PASSWORD=${HASHED_PASSWORD}
          SENTRY_DSN=${SENTRY_DSN:-}
          EOF

          sed -i 's/^[[:space:]]*//' .env
          echo "=== Effective .env (sanitized) ===" ; sed -E 's/(SECRET_KEY|PASSWORD|HASHED_PASSWORD|RESEND_API_KEY|SENTRY_DSN)=.*/\1=****/' .env

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull images
        run: |
          set -euo pipefail
          # Pull API image (always exists at this point)
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" pull api db proxy prestart || true
          # Pull web app images (may not exist yet on first deploy — ignore failures)
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" pull \
            web-auth web-admin web-wxwatch web-hurricaneplan web-spicewx \
            web-wxproducts web-hr web-salesbus 2>/dev/null || true

      - name: Start database
        run: |
          set -euo pipefail
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" up -d db
          echo "Waiting for database..."
          for i in {1..20}; do
            if docker inspect --format='{{json .State.Health.Status}}' "grenmet-db-1" 2>/dev/null | grep -q healthy; then
              echo "Database ready"; break
            fi
            echo "Attempt $i/20..."; sleep 3
            [ $i -eq 20 ] && { echo "::error::Database did not become ready"; exit 1; }
          done

      - name: Deploy full stack
        run: |
          set -euxo pipefail
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" up -d --remove-orphans
          echo "=== Service status ===" ; docker compose -p "grenmet" ps || true

      - name: Health checks
        run: |
          sleep 20
          echo "=== API health check ==="
          curl -sS https://api.weather.gd/api/v1/utils/health-check/ || echo "API health check failed"
          echo "=== Auth app health check ==="
          curl -sSo /dev/null -w "%{http_code}" https://auth.weather.gd/ || echo "Auth health check failed"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -p "grenmet" ps || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=100 prestart || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=100 api || true
          docker compose --env-file .env -f docker-compose.prod.yml -p "grenmet" logs --no-color --tail=50 db || true

      - name: Cleanup
        if: always()
        run: |
          docker system prune -af || true
          rm -f .env
