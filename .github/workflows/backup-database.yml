name: Database Backup

on:
  schedule:
    # Daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    name: Database Backup
    runs-on: [self-hosted, production]
    timeout-minutes: 30
    environment:
      name: production-backup
    permissions:
      contents: read
    env:
      BACKUP_RETENTION_DAYS: 30
      BACKUP_DIR: /var/backups/grenmet

    steps:
      - name: Verify database connectivity
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          if docker compose -p "grenmet" exec -T db pg_isready -U "$POSTGRES_USER" -d app_prod; then
            echo "Database ready"
          else
            echo "Database not ready" && exit 1
          fi

      # ── app_prod ────────────────────────────────────────────────────────────────

      - name: Backup app_prod
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          mkdir -p "$BACKUP_DIR"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="app_prod_${TIMESTAMP}.dump"
          BACKUP_PATH="$BACKUP_DIR/$FILENAME"

          docker compose -p "grenmet" exec -T db pg_dump \
            -U "$POSTGRES_USER" -d app_prod \
            --format=custom --compress=9 --file="/tmp/backup.dump"

          docker cp "grenmet-db-1:/tmp/backup.dump" "$BACKUP_PATH"
          docker compose -p "grenmet" exec -T db rm -f /tmp/backup.dump

          [ -f "$BACKUP_PATH" ] && [ -s "$BACKUP_PATH" ] || { echo "Backup missing or empty" && exit 1; }
          echo "app_prod: $FILENAME ($(du -h "$BACKUP_PATH" | cut -f1))"
          echo "APP_BACKUP_PATH=$BACKUP_PATH" >> "$GITHUB_ENV"

      - name: Verify app_prod backup integrity
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          TEMP_DB="verify_$(date +%s)"
          docker compose -p "grenmet" exec -T db createdb -U "$POSTGRES_USER" "$TEMP_DB"
          docker cp "$APP_BACKUP_PATH" "grenmet-db-1:/tmp/verify.dump"
          docker compose -p "grenmet" exec -T db pg_restore \
            -U "$POSTGRES_USER" -d "$TEMP_DB" --no-password /tmp/verify.dump
          TABLE_COUNT=$(docker compose -p "grenmet" exec -T db psql \
            -U "$POSTGRES_USER" -d "$TEMP_DB" -t \
            -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" | tr -d ' \n')
          docker compose -p "grenmet" exec -T db dropdb -U "$POSTGRES_USER" "$TEMP_DB"
          docker compose -p "grenmet" exec -T db rm -f /tmp/verify.dump
          [ "$TABLE_COUNT" -gt 0 ] || { echo "Integrity check failed" && exit 1; }
          echo "app_prod integrity OK ($TABLE_COUNT tables)"

      # ── wxwatch ─────────────────────────────────────────────────────────────────

      - name: Backup wxwatch
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="wxwatch_${TIMESTAMP}.dump"
          BACKUP_PATH="$BACKUP_DIR/$FILENAME"

          docker compose -p "grenmet" exec -T db pg_dump \
            -U "$POSTGRES_USER" -d wxwatch \
            --format=custom --compress=9 --file="/tmp/backup.dump"

          docker cp "grenmet-db-1:/tmp/backup.dump" "$BACKUP_PATH"
          docker compose -p "grenmet" exec -T db rm -f /tmp/backup.dump

          [ -f "$BACKUP_PATH" ] && [ -s "$BACKUP_PATH" ] || { echo "Backup missing or empty" && exit 1; }
          echo "wxwatch: $FILENAME ($(du -h "$BACKUP_PATH" | cut -f1))"
          echo "WXWATCH_BACKUP_PATH=$BACKUP_PATH" >> "$GITHUB_ENV"

      - name: Verify wxwatch backup integrity
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          TEMP_DB="verify_$(date +%s)"
          docker compose -p "grenmet" exec -T db createdb -U "$POSTGRES_USER" "$TEMP_DB"
          docker cp "$WXWATCH_BACKUP_PATH" "grenmet-db-1:/tmp/verify.dump"
          docker compose -p "grenmet" exec -T db pg_restore \
            -U "$POSTGRES_USER" -d "$TEMP_DB" --no-password /tmp/verify.dump
          TABLE_COUNT=$(docker compose -p "grenmet" exec -T db psql \
            -U "$POSTGRES_USER" -d "$TEMP_DB" -t \
            -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" | tr -d ' \n')
          docker compose -p "grenmet" exec -T db dropdb -U "$POSTGRES_USER" "$TEMP_DB"
          docker compose -p "grenmet" exec -T db rm -f /tmp/verify.dump
          [ "$TABLE_COUNT" -gt 0 ] || { echo "Integrity check failed" && exit 1; }
          echo "wxwatch integrity OK ($TABLE_COUNT tables)"

      # ── wxproducts ───────────────────────────────────────────────────────────────

      - name: Backup wxproducts
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="wxproducts_${TIMESTAMP}.dump"
          BACKUP_PATH="$BACKUP_DIR/$FILENAME"

          docker compose -p "grenmet" exec -T db pg_dump \
            -U "$POSTGRES_USER" -d wxproducts \
            --format=custom --compress=9 --file="/tmp/backup.dump"

          docker cp "grenmet-db-1:/tmp/backup.dump" "$BACKUP_PATH"
          docker compose -p "grenmet" exec -T db rm -f /tmp/backup.dump

          [ -f "$BACKUP_PATH" ] && [ -s "$BACKUP_PATH" ] || { echo "Backup missing or empty" && exit 1; }
          echo "wxproducts: $FILENAME ($(du -h "$BACKUP_PATH" | cut -f1))"
          echo "WXPRODUCTS_BACKUP_PATH=$BACKUP_PATH" >> "$GITHUB_ENV"

      - name: Verify wxproducts backup integrity
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          set -euo pipefail
          TEMP_DB="verify_$(date +%s)"
          docker compose -p "grenmet" exec -T db createdb -U "$POSTGRES_USER" "$TEMP_DB"
          docker cp "$WXPRODUCTS_BACKUP_PATH" "grenmet-db-1:/tmp/verify.dump"
          docker compose -p "grenmet" exec -T db pg_restore \
            -U "$POSTGRES_USER" -d "$TEMP_DB" --no-password /tmp/verify.dump
          TABLE_COUNT=$(docker compose -p "grenmet" exec -T db psql \
            -U "$POSTGRES_USER" -d "$TEMP_DB" -t \
            -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" | tr -d ' \n')
          docker compose -p "grenmet" exec -T db dropdb -U "$POSTGRES_USER" "$TEMP_DB"
          docker compose -p "grenmet" exec -T db rm -f /tmp/verify.dump
          [ "$TABLE_COUNT" -gt 0 ] || { echo "Integrity check failed" && exit 1; }
          echo "wxproducts integrity OK ($TABLE_COUNT tables)"

      # ── Retention & summary ──────────────────────────────────────────────────────

      - name: Remove old backups
        run: |
          find "$BACKUP_DIR" -name "app_prod_*.dump" -type f -mtime +$BACKUP_RETENTION_DAYS -delete
          find "$BACKUP_DIR" -name "wxwatch_*.dump" -type f -mtime +$BACKUP_RETENTION_DAYS -delete
          find "$BACKUP_DIR" -name "wxproducts_*.dump" -type f -mtime +$BACKUP_RETENTION_DAYS -delete
          echo "Remaining backups:"
          ls -lah "$BACKUP_DIR"/*.dump 2>/dev/null || echo "(none)"

      - name: Summary
        run: |
          echo "app_prod:   $(du -h "$APP_BACKUP_PATH" | cut -f1)"
          echo "wxwatch:    $(du -h "$WXWATCH_BACKUP_PATH" | cut -f1)"
          echo "wxproducts: $(du -h "$WXPRODUCTS_BACKUP_PATH" | cut -f1)"
          echo "Retention: $BACKUP_RETENTION_DAYS days"
