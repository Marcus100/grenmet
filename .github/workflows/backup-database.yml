name: Database Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Type of backup to perform'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental

jobs:
  backup:
    name: Database Backup
    runs-on: [self-hosted, production, azure-vm]
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
    env:
      BACKUP_RETENTION_DAYS: 30
      BACKUP_DIR: /home/github/backups
    defaults:
      run:
        working-directory: apps/api/fastapi
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup backup environment
        run: |
          set -euo pipefail
          echo "🗄️ Setting up backup environment..."
          
          # Create backup directory
          mkdir -p "$BACKUP_DIR"
          
          # Load production environment
          PROD_ENV="/home/github/.config/eugine-api/production.env"
          if [ -f "$PROD_ENV" ]; then
            echo "Loading production environment..."
            cp "$PROD_ENV" .env
          else
            echo "ERROR: Production environment file not found at $PROD_ENV"
            exit 1
          fi
          
          # Source environment variables
          set -a
          source .env
          set +a
          
          echo "✅ Backup environment setup complete"

      - name: Verify database connectivity
        run: |
          set -euo pipefail
          echo "🔍 Verifying database connectivity..."
          
          # Test database connection
          if docker compose -f docker-compose.prod.yml -p "barrels-api" exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then
            echo "✅ Database is ready for backup"
          else
            echo "❌ Database is not ready"
            exit 1
          fi

      - name: Create database backup
        run: |
          set -euo pipefail
          echo "💾 Creating database backup..."
          
          # Generate backup filename with timestamp
          BACKUP_TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILENAME="barrels_api_backup_${BACKUP_TIMESTAMP}.sql.gz"
          BACKUP_PATH="$BACKUP_DIR/$BACKUP_FILENAME"
          
          # Create backup
          echo "Creating backup: $BACKUP_FILENAME"
          docker compose -f docker-compose.prod.yml -p "barrels-api" exec -T db pg_dump \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            --verbose \
            --no-password \
            --format=custom \
            --compress=9 \
            --file="/tmp/backup.dump"
          
          # Copy backup from container to host
          docker compose -f docker-compose.prod.yml -p "barrels-api" cp "barrels-api-db-1:/tmp/backup.dump" "$BACKUP_PATH"
          
          # Verify backup file
          if [ -f "$BACKUP_PATH" ] && [ -s "$BACKUP_PATH" ]; then
            BACKUP_SIZE=$(du -h "$BACKUP_PATH" | cut -f1)
            echo "✅ Backup created successfully: $BACKUP_FILENAME ($BACKUP_SIZE)"
          else
            echo "❌ Backup creation failed"
            exit 1
          fi

      - name: Test backup integrity
        run: |
          set -euo pipefail
          echo "🔍 Testing backup integrity..."
          
          # Test backup by restoring to a temporary database
          TEMP_DB_NAME="test_restore_$(date +%s)"
          
          # Create temporary database
          docker compose -f docker-compose.prod.yml -p "barrels-api" exec -T db createdb -U "$POSTGRES_USER" "$TEMP_DB_NAME"
          
          # Restore backup to temporary database
          docker compose -f docker-compose.prod.yml -p "barrels-api" exec -T db pg_restore \
            -U "$POSTGRES_USER" \
            -d "$TEMP_DB_NAME" \
            --verbose \
            --no-password \
            --clean \
            --if-exists \
            "/tmp/backup.dump"
          
          # Verify restore
          TABLE_COUNT=$(docker compose -f docker-compose.prod.yml -p "barrels-api" exec -T db psql \
            -U "$POSTGRES_USER" \
            -d "$TEMP_DB_NAME" \
            -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" | tr -d ' ')
          
          # Clean up temporary database
          docker compose -f docker-compose.prod.yml -p "barrels-api" exec -T db dropdb -U "$POSTGRES_USER" "$TEMP_DB_NAME"
          
          if [ "$TABLE_COUNT" -gt 0 ]; then
            echo "✅ Backup integrity test passed ($TABLE_COUNT tables restored)"
          else
            echo "❌ Backup integrity test failed"
            exit 1
          fi

      - name: Clean up old backups
        run: |
          set -euo pipefail
          echo "🧹 Cleaning up old backups..."
          
          # Remove backups older than retention period
          find "$BACKUP_DIR" -name "barrels_api_backup_*.sql.gz" -type f -mtime +$BACKUP_RETENTION_DAYS -delete
          
          # List remaining backups
          echo "📋 Remaining backups:"
          ls -lah "$BACKUP_DIR"/barrels_api_backup_*.sql.gz 2>/dev/null || echo "No backups found"
          
          echo "✅ Old backup cleanup completed"

      - name: Upload backup to Azure Blob Storage (if configured)
        run: |
          set -euo pipefail
          echo "☁️ Uploading backup to Azure Blob Storage..."
          
          # Check if Azure CLI is available and configured
          if command -v az >/dev/null 2>&1; then
            # Check if storage account is configured
            if [ -n "${AZURE_STORAGE_ACCOUNT:-}" ] && [ -n "${AZURE_STORAGE_CONTAINER:-}" ]; then
              echo "Uploading to Azure Storage Account: $AZURE_STORAGE_ACCOUNT"
              az storage blob upload \
                --account-name "$AZURE_STORAGE_ACCOUNT" \
                --container-name "$AZURE_STORAGE_CONTAINER" \
                --file "$BACKUP_PATH" \
                --name "$BACKUP_FILENAME" \
                --overwrite
              echo "✅ Backup uploaded to Azure Blob Storage"
            else
              echo "⚠️ Azure Storage not configured, skipping upload"
            fi
          else
            echo "⚠️ Azure CLI not available, skipping upload"
          fi

      - name: Backup summary
        run: |
          set -euo pipefail
          echo "📊 Backup Summary"
          echo "=================="
          echo "Backup file: $BACKUP_FILENAME"
          echo "Backup size: $(du -h "$BACKUP_PATH" | cut -f1)"
          echo "Backup location: $BACKUP_PATH"
          echo "Retention: $BACKUP_RETENTION_DAYS days"
          echo "Timestamp: $(date)"
          echo "✅ Database backup completed successfully"

      - name: Cleanup runner environment
        if: always()
        run: |
          echo "🧹 Cleaning up backup runner environment..."
          # Clean up Docker resources
          docker system prune -af --volumes || true
          # Remove any temporary files
          rm -rf /tmp/* || true
          # Clear any sensitive environment variables
          unset SECRET_KEY POSTGRES_PASSWORD FIRST_SUPERUSER_PASSWORD || true
          echo "✅ Backup runner cleanup completed"
