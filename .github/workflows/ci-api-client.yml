name: API Client Generation

on:
  pull_request:
    branches: [ main, staging, dev ]
  push:
    branches:
      - main
      - staging
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-client:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client
        run: pnpm generate:api-client

      - name: Ensure generated client is committed
        run: git diff --exit-code -- packages/api-client/src/gen

      - name: Type-check API client package
        run: pnpm --filter @grenmet/api-client run type-check

      - name: Build API client package
        run: pnpm --filter @grenmet/api-client run build

      - name: Type-check admin consumer
        run: pnpm --filter @grenmet/web-admin run type-check
