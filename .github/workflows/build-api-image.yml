name: Build and Push Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - staging
  push:
    branches:
      - staging
    paths:
      - "apps/api/fastapi/**"
      - ".github/workflows/build-api-image.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (staging or latest)"
        required: true
        type: choice
        options:
          - staging
          - latest

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'release' && github.event.action == 'published')
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve effective branch
        id: ctx
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" == "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          elif [ "$EVENT" == "workflow_dispatch" ]; then
            BRANCH="${{ github.event.inputs.tag }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          if [ "$BRANCH" == "staging" ] && [ "$EVENT" != "release" ]; then
            echo "is_staging=true" >> $GITHUB_OUTPUT
          else
            echo "is_staging=false" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging,enable=${{ steps.ctx.outputs.is_staging == 'true' }}
            type=raw,value=latest,enable=${{ steps.ctx.outputs.is_staging == 'false' }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/api/fastapi
          file: apps/api/fastapi/Dockerfile.prod
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          platforms: linux/amd64

      - name: Image digest summary
        run: |
          echo "✅ grenmet-api image built and pushed successfully"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
