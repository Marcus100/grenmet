# GrenMet API — Production Stack
# Used by: .github/workflows/deploy-prod.yml
# working-directory: apps/api/fastapi → reference as ../../infra/docker/docker-compose.prod.yml
#
# Required secrets (set in GitHub Environment "production"):
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   SECRET_KEY, FIRST_SUPERUSER, FIRST_SUPERUSER_PASSWORD
#   REGISTRY, IMAGE_NAME, TAG, DOMAIN, ENVIRONMENT
#   EMAIL, USERNAME, HASHED_PASSWORD, SENTRY_DSN

services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - grenmet-api

  prestart:
    image: ${REGISTRY}/${IMAGE_NAME}:${TAG}
    restart: "no"
    command: bash scripts/prestart.sh
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT}
    networks:
      - grenmet-api

  api:
    image: ${REGISTRY}/${IMAGE_NAME}:${TAG}
    restart: always
    depends_on:
      prestart:
        condition: service_completed_successfully
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT}
      DOMAIN: ${DOMAIN}
      SENTRY_DSN: ${SENTRY_DSN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grenmet-api.rule=Host(`api.weather.gd`)"
      - "traefik.http.routers.grenmet-api.entrypoints=websecure"
      - "traefik.http.routers.grenmet-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.grenmet-api.loadbalancer.server.port=8000"
    networks:
      - grenmet-api

  proxy:
    image: traefik:v3.0
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/certificates
    command:
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/certificates/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --accesslog
      - --log
      - --api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.weather.gd`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${USERNAME}:${HASHED_PASSWORD}"
      - "traefik.http.routers.http-catchall.rule=hostregexp(`.+`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
    networks:
      - grenmet-api

networks:
  grenmet-api:
    driver: bridge

volumes:
  pgdata:
  traefik-certificates:
