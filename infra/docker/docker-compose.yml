# Grenmet Monorepo - Shared Infrastructure
# Usage (from repo root):
#   pnpm infra:up        - Start Postgres only
#   pnpm infra:up:all    - Start Postgres + Adminer + Mailcatcher
#   pnpm infra:down      - Stop all infra
#   pnpm infra:reset     - Wipe DB and start fresh
services:
  postgres:
    image: postgres:17
    container_name: grenmet-postgres
    restart: "no"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init-database.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - grenmet

  adminer:
    image: adminer
    container_name: grenmet-adminer
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DESIGN: pepa-linha-dark
    profiles: [tools]
    networks:
      - grenmet

  mailcatcher:
    image: schickling/mailcatcher
    container_name: grenmet-mailcatcher
    restart: "no"
    ports:
      - "1080:1080"
      - "1025:1025"
    profiles: [tools]
    networks:
      - grenmet

networks:
  grenmet:
    name: grenmet
    driver: bridge

volumes:
  pgdata:
