# Grenmet Monorepo - Shared Infrastructure
# From repo root:
#   pnpm start   - Start infra (tools profile) + FastAPI
#   pnpm stop    - Stop FastAPI and infra
#   pnpm status  - Show container status
#   pnpm reset   - Tear down infra with volumes, then start Postgres only
services:
  postgres:
    image: postgres:18
    container_name: grenmet-postgres
    restart: "no"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
      APP_DB_NAME: ${APP_DB_NAME:-}
      APP_DB_USER: ${APP_DB_USER:-}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-}
      WXWATCH_DB_NAME: ${WXWATCH_DB_NAME:-wxwatch}
      WXWATCH_DB_USER: ${WXWATCH_DB_USER:-wxwatch}
      WXWATCH_DB_PASSWORD: ${WXWATCH_DB_PASSWORD:-changethis}
      WXPRODUCTS_DB_NAME: ${WXPRODUCTS_DB_NAME:-wxproducts}
      WXPRODUCTS_DB_USER: ${WXPRODUCTS_DB_USER:-wxproducts}
      WXPRODUCTS_DB_PASSWORD: ${WXPRODUCTS_DB_PASSWORD:-changethis}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - grenmet

  adminer:
    image: adminer
    container_name: grenmet-adminer
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DESIGN: ${ADMINER_DESIGN:-pepa-linha-dark}
    profiles: [tools]
    networks:
      - grenmet

  mailcatcher:
    image: axllent/mailpit
    container_name: grenmet-mailcatcher
    restart: "no"
    ports:
      - "1080:8025"
      - "1025:1025"
    profiles: [tools]
    networks:
      - grenmet

networks:
  grenmet:
    name: grenmet
    driver: bridge

volumes:
  pgdata:
