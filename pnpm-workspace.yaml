packages:
  # Apps
  - "apps/web/*"
  - "apps/api/honoapi"
  # Note: fastapi is Python, not managed by pnpm

  # Shared packages
  - "packages/*"

# Suppress install-script warnings for packages blocked by onlyBuiltDependencies
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

catalog:
  # Core
  react: "^19.2.0"
  react-dom: "^19.2.0"
  next: "16.1.1"
  typescript: "^5.9.3"

  tsx: "^4.21.0"

  # Styling
  tailwindcss: "^4.1.18"
  "@tailwindcss/postcss": "^4.1.18"

  # Data fetching
  "@tanstack/react-query": "^5.90.16"

  # UI
  lucide-react: "^0.562.0"
  "@base-ui/react": "^1.6.0"
  class-variance-authority: "^0.7.1"
  clsx: "^2.1.1"
  tailwind-merge: "^3.6.0"
  tw-animate-css: "^1.4.0"
  cmdk: "^1.1.1"
  sonner: "^2.0.7"
  recharts: "^3.9.0"
  vaul: "^1.1.2"
  react-resizable-panels: "^4.12.0"
  input-otp: "^1.4.2"
  embla-carousel-react: "^8.6.0"
  simple-icons: "^16.24.1"

  # Studio demo dashboards (kanban/invoice drag-drop, logistics map)
  "@dnd-kit/core": "^6.3.1"
  "@dnd-kit/modifiers": "^9.0.0"
  "@dnd-kit/sortable": "^10.0.0"
  d3-geo: "^3.1.1"
  topojson-client: "^3.1.0"
  react-hook-form: "^7.80.0"
  "@hookform/resolvers": "^5.4.0"
  "@fullcalendar/react": "^7.0.0"
  "@types/d3-geo": "^3.1.0"
  "@types/topojson-client": "^3.1.5"
  "@types/geojson": "^7946.0.16"

  # Tables — admin-gms (data tables + virtualised lists)
  "@tanstack/react-table": "^8.21.3"
  "@tanstack/react-virtual": "^3.13.17"

  # Animation — motion (successor to framer-motion); import from "motion/react"
  motion: "^12.23.11"

  # Types
  "@types/node": "^22"
  "@types/react": "^19.2.1"
  "@types/react-dom": "^19.2.1"

  # Database (Drizzle) — used in wxwatch and wxproducts
  drizzle-orm: "^0.45.1"
  drizzle-kit: "^0.31.10"

  # Validation — used across multiple web apps
  zod: "^4.3.5"
  "@t3-oss/env-nextjs": "^0.13.10"

  # Themes
  next-themes: "^0.4.6"

  # State management — @grenmet/theme preferences store
  zustand: "^5.0.14"

  # Database (pg) — used in wxwatch and wxproducts
  pg: "^8.17.1"
  "@types/pg": "^8.16.0"
  dotenv-cli: "^11.0.0"

  # Headless UI — used in spicewx and hurricaneplan (migrate to Base UI eventually)
  "@headlessui/react": "^2.2.9"

  # MDX — content-collections stack (hurricaneplan, signal) + @grenmet/mdx
  "@content-collections/core": "^0.10.0"
  "@content-collections/cli": "^0.1.9"
  "@content-collections/mdx": "^0.2.2"
  "@content-collections/next": "^0.2.8"
  "@tailwindcss/typography": "^0.5.16"
  mdx-annotations: "^0.1.4"
  remark-gfm: "^4.0.1"

  # TypeScript safety utilities
  "@total-typescript/ts-reset": "^0.6.1"

  # Admin-gms map/date
  "react-day-picker": "^9.7.0"
  "react-simple-maps": "^3.0.0"

  # Error tracking
  "@sentry/nextjs": "^10"

  # Analytics
  "posthog-js": "^1.273.0"
  "posthog-node": "^4.9.2"

  # Testing
  vitest: "^4.0.17"
  "@vitest/coverage-v8": "^4.0.17"
  msw: "^2.12.7"
  "@testing-library/react": "^16.3.1"
  "@testing-library/user-event": "^14.6.1"
  "@testing-library/jest-dom": "^6.9.1"
  "@testing-library/dom": "^10.4.1"
  jsdom: "^27.4.0"
  "@playwright/test": "^1.57.0"
  "@faker-js/faker": "^10.2.0"
