packages:
  # Apps
  - "apps/web/*"
  - "apps/api/honoapi"
  # Note: fastapi is Python, not managed by pnpm

  # Shared packages
  - "packages/*"

# Suppress install-script warnings for packages blocked by onlyBuiltDependencies
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

catalog:
  # Core
  react: "^19.2.0"
  react-dom: "^19.2.0"
  next: "16.1.1"
  typescript: "^5.9.3"

  tsx: "^4.21.0"

  # Styling
  tailwindcss: "^4.1.18"
  "@tailwindcss/postcss": "^4.1.18"

  # Data fetching
  "@tanstack/react-query": "^5.90.16"

  # UI
  lucide-react: "^0.562.0"
  "@base-ui-components/react": "^1.0.0-rc.0"
  class-variance-authority: "^0.7.1"
  clsx: "^2.1.1"
  tailwind-merge: "^2.6.0"
  tw-animate-css: "^1.4.0"

  # Types
  "@types/node": "^22"
  "@types/react": "^19.2.1"
  "@types/react-dom": "^19.2.1"

  # Database (Drizzle) — used in wxwatch and wxproducts
  drizzle-orm: "^0.45.1"
  drizzle-kit: "^0.31.10"

  # Validation — used across multiple web apps
  zod: "^4.3.5"
  "@t3-oss/env-nextjs": "^0.13.10"

  # React Compiler — used in auth, hr, spicewx, wxproducts
  babel-plugin-react-compiler: "^1.0.0"

  # Themes
  next-themes: "^0.4.6"

  # Headless UI
  "@headlessui/react": "^2.2.9"

  # Database (pg) — used in wxwatch and wxproducts
  pg: "^8.17.1"
  "@types/pg": "^8.16.0"
  dotenv-cli: "^11.0.0"

  # MDX — keep in sync with next catalog version
  "@next/mdx": "16.1.1"
