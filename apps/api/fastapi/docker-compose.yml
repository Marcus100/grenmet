# ===========================================
# FastAPI - Local Development
# ===========================================
# Requires shared infra running first:
#   pnpm infra:up        - Start Postgres
#   pnpm infra:up:all    - Start Postgres + Adminer + Mailcatcher
#
# Then start FastAPI:
#   pnpm dev:api         - Start prestart + API
#   pnpm dev:api:down    - Stop FastAPI services
# ===========================================

services:
  prestart:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command: bash scripts/prestart.sh
    volumes:
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=grenmet-postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    networks:
      - grenmet

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      prestart:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=grenmet-postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SMTP_HOST=grenmet-mailcatcher
      - SMTP_PORT=1025
      - SMTP_TLS=false
      - EMAILS_FROM_EMAIL=noreply@weather.gd
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./email-templates:/app/email-templates
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: rebuild
          path: ./pyproject.toml
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys,urllib.request,socket; socket.setdefaulttimeout(3);\n\ntry:\n    r=urllib.request.urlopen('http://localhost:8000/api/v1/utils/health-check/'); sys.exit(0 if r.status==200 else 1)\nexcept Exception:\n    sys.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - grenmet

networks:
  grenmet:
    external: true
