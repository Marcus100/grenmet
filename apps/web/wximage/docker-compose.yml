version: "3.9"
services:
  postgres:
    image: postgres:17
    restart: always
    container_name: my-postgres-container
    ports:
      - 5433:5432
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
